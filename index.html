<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelson Lab - Physics 30</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        canvas {
            background: #1e293b;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .ui-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 860px;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
        }
        .selector-group { display: flex; gap: 10px; align-items: center; }
        select {
            padding: 8px;
            background: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        input[type=range] { flex-grow: 1; cursor: pointer; }
        .freq-display {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            color: #3b82f6;
            font-weight: bold;
            min-width: 120px;
            text-align: right;
        }
        .btn-group { display: flex; gap: 15px; width: 100%; justify-content: center; }
        button {
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        #fireBtn {
            background: #f59e0b;
            color: #0f172a;
            flex-grow: 1;
            box-shadow: 0 4px 0 #b45309;
        }
        #fireBtn.armed { background: #ef4444; color: white; animation: pulse 1s infinite; }
        #freezeToggle {
            background: #334155;
            color: #94a3b8;
            border: 1px solid #475569;
            min-width: 200px;
        }
        #freezeToggle.active { background: #3b82f6; color: white; border-color: #60a5fa; }
        
        #resumeBtn {
            display: none;
            background: #10b981;
            color: white;
            position: absolute;
            top: 400px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            z-index: 50;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        #mathModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            border: 2px solid #10b981;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            z-index: 100;
            width: 480px;
            text-align: center;
        }
        .math-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
        .formula-box { background: #0f172a; padding: 15px; border-radius: 8px; border-left: 4px solid #facc15; }
        .result-text { font-size: 1.5rem; color: #10b981; font-weight: 900; }
        .close-btn { margin-top: 25px; background: #10b981; color: #0f172a; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .status-msg { font-family: 'Courier New', monospace; font-size: 1.1rem; color: #94a3b8; height: 1.2em; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 5px;">Michelson Speed of Light Rotating Mirror</h2>
    <p style="color: #64748b; margin-top: 0;">Adjust the sides of the mirror and frequency</p>
    
    <div style="position: relative;">
        <canvas id="simCanvas" width="900" height="520"></canvas>
        <button id="resumeBtn">CLICK TO RESUME</button>
    </div>

    <div class="ui-container">
        <div class="control-row">
            <div class="selector-group">
                <label>Sides (n):</label>
                <select id="sideSelector">
                    <option value="8" selected>8 Sided</option>
                    <option value="10">10 Sided</option>
                    <option value="16">16 Sided</option>
                </select>
            </div>
            <input type="range" id="freqSlider" min="100" max="800" value="500" step="1">
            <div class="freq-display"><span id="freqVal">500</span> Hz</div>
        </div>

        <div class="btn-group">
            <button id="freezeToggle">Freeze at Impact: OFF</button>
            <button id="fireBtn">FIRE PHOTON</button>
        </div>

        <div id="statusMsg" class="status-msg">Observe the magnified impact point.</div>
    </div>

    <div id="mathModal">
        <div class="modal-header" style="color:#10b981; font-size:1.5rem; font-weight:bold; margin-bottom:15px;">Analysis Complete</div>
        <div class="math-grid">
            <span>Distance (d):</span> <span style="font-weight:bold">30.0 km</span>
            <span>Sides (n):</span> <span id="modalSides" style="font-weight:bold">8</span>
            <span>Frequency (f):</span> <span id="modalFreq" style="font-weight:bold">625 Hz</span>
            <span>Rotation Period:</span> <span id="modalPeriod" style="font-weight:bold">1600 μs</span>
        </div>
        <div class="formula-box">
            <div style="color:#facc15; font-weight:bold; font-size:1.2rem; margin-bottom:5px;">c = 2ndf</div>
            <div class="result-text" id="finalResult">299,796 km/s</div>
        </div>
        <button class="close-btn" onclick="closeModal()">Return to Lab</button>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const sideSelector = document.getElementById('sideSelector');
    const freqSlider = document.getElementById('freqSlider');
    const freqVal = document.getElementById('freqVal');
    const fireBtn = document.getElementById('fireBtn');
    const freezeToggle = document.getElementById('freezeToggle');
    const resumeBtn = document.getElementById('resumeBtn');
    const statusMsg = document.getElementById('statusMsg');
    const modal = document.getElementById('mathModal');

    // Setup Constants
    const C = 299796;
    const D = 30.0;
    const centerX = 200, centerY = 270, octRadius = 80, distMirrorX = 850;

    // Simulation State
    let n = 8;
    let currentFreq = 500;
    let angle = 0;
    let photon = null;
    let fireQueued = false;
    let flightTime = 0;
    let isFrozen = false;
    let freezeEnabled = false;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'success') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        }
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function drawPolygon(x, y, r, sides, rot, isZoomed = false) {
        const alpha = (2 * Math.PI) / sides;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.beginPath();
        for (let i = 0; i < sides; i++) {
            const theta = i * alpha - (alpha/2);
            const px = r * Math.cos(theta);
            const py = r * Math.sin(theta);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = "#1e293b";
        ctx.fill();
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = isZoomed ? 4 : 2;
        ctx.stroke();
        
        // Red Marker
        ctx.fillStyle = "#ef4444";
        ctx.font = isZoomed ? "bold 36px Arial" : "bold 18px Arial"; 
        ctx.fillText("1", (r - (isZoomed ? 40 : 20)) * Math.cos(0), (r - (isZoomed ? 40 : 20)) * Math.sin(0));
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Timers
        const rotationPeriodUs = (1 / currentFreq) * 1000000;
        ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.roundRect(40, 20, 280, 75, 8); ctx.fill();
        ctx.strokeStyle = "#34d399"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#94a3b8"; ctx.font = "bold 10px sans-serif"; ctx.fillText("TIME OF FLIGHT (2d/c)", 55, 40);
        ctx.fillStyle = "#34d399"; ctx.font = "bold 26px monospace"; ctx.fillText(flightTime.toFixed(2) + " μs", 55, 75);

        ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.roundRect(580, 20, 280, 75, 8); ctx.fill();
        ctx.strokeStyle = "#facc15"; ctx.strokeRect(580, 20, 280, 75);
        ctx.fillStyle = "#94a3b8"; ctx.font = "bold 10px sans-serif"; ctx.fillText("PERIOD OF ROTATION (1/f)", 595, 40);
        ctx.fillStyle = "#facc15"; ctx.font = "bold 26px monospace"; ctx.fillText(rotationPeriodUs.toFixed(0) + " μs", 595, 75);

        // Scene
        ctx.strokeStyle = "#475569"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(centerX+100, centerY); ctx.lineTo(distMirrorX-20, centerY); ctx.stroke();
        ctx.fillStyle = "#3b82f6"; ctx.font = "bold 14px monospace"; ctx.fillText("30.0 km", (centerX+distMirrorX)/2 - 30, centerY+25);
        ctx.fillStyle = "#64748b"; ctx.fillRect(distMirrorX, centerY - 80, 15, 160);

        const alpha = (2 * Math.PI) / n;
        const posA = { x: centerX + octRadius * Math.cos(-alpha/2), y: centerY + octRadius * Math.sin(-alpha/2) };
        const posB = { x: centerX + octRadius * Math.cos(alpha/2), y: centerY + octRadius * Math.sin(alpha/2) };
        ctx.font = "30px Arial"; ctx.fillText("🔦", posA.x - 15, posA.y - 45); ctx.fillText("👁️", posB.x - 15, posB.y + 65);

        drawPolygon(centerX, centerY, octRadius, n, angle);

        if (photon) {
            const speed = 18; ctx.beginPath(); ctx.fillStyle = "#facc15";
            if (photon.stage === 'to-mountain' || photon.stage === 'returning') {
                const totalTripPixels = (distMirrorX - posA.x) * 2;
                const progressPixels = (photon.stage === 'to-mountain') ? (photon.x - posA.x) : (distMirrorX - posA.x) + (distMirrorX - photon.x);
                flightTime = (progressPixels / totalTripPixels) * 200.14;
            }

            if (!isFrozen) {
                switch(photon.stage) {
                    case 'launch': photon.y += speed; if (photon.y >= posA.y) { photon.stage = 'to-mountain'; flightTime = 0; } break;
                    case 'to-mountain': photon.x += speed; photon.y += (centerY - posA.y) / ((distMirrorX - posA.x) / speed); if (photon.x >= distMirrorX) photon.stage = 'returning'; break;
                    case 'returning': photon.x -= speed; photon.y += (posB.y - centerY) / ((distMirrorX - posB.x) / speed);
                        if (photon.x <= posB.x) {
                            if (freezeEnabled) { 
                                isFrozen = true; 
                                resumeBtn.style.display = 'block'; 
                                statusMsg.innerText = "IMPACT MAGNIFIED. Check face alignment.";
                            } else { finishTrip(); }
                        } break;
                    case 'success': ctx.fillStyle = "#10b981"; photon.y += speed; if (photon.y >= posB.y + 60) { triggerModal(); } break;
                    case 'scatter': ctx.fillStyle = "#ef4444"; photon.x += photon.vx; photon.y += photon.vy; if (photon.x < -50 || photon.y < -50 || photon.y > 600) resetPhoton(); break;
                }
            }
            if (photon) { ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.arc(photon.x, photon.y, 9, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; }
        }

        // Draw Zoom Bubble if frozen
        if (isFrozen && photon) {
            const zoomX = 450, zoomY = 320, zoomR = 100, zoomScale = 2.5;
            
            ctx.save();
            ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomR, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = "#1e293b"; ctx.fillRect(zoomX - zoomR, zoomY - zoomR, zoomR * 2, zoomR * 2);
            
            // Draw magnified mirror section
            const offsetX = zoomX - photon.x * zoomScale;
            const offsetY = zoomY - photon.y * zoomScale;
            ctx.translate(offsetX, offsetY);
            ctx.scale(zoomScale, zoomScale);
            drawPolygon(centerX, centerY, octRadius, n, angle, true);
            
            // Magnified Photon
            ctx.beginPath(); ctx.fillStyle = "#facc15"; ctx.arc(photon.x, photon.y, 9, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.restore();
            // Bubble border
            ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomR, 0, Math.PI * 2);
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText("ZOOM: IMPACT POINT", zoomX - 55, zoomY + zoomR - 10);
        }
    }

    function finishTrip() {
        const target = C / (2 * n * D);
        flightTime = 200.14;
        if (Math.abs(currentFreq - target) < (target * 0.012)) { photon.stage = 'success'; playSound('success'); }
        else { photon.stage = 'scatter'; photon.vx = -18; photon.vy = (currentFreq - target) * 0.12; playSound('fail'); }
    }

    function triggerModal() {
        document.getElementById('modalSides').innerText = n;
        document.getElementById('modalFreq').innerText = currentFreq + " Hz";
        document.getElementById('modalPeriod').innerText = Math.round((1/currentFreq)*1000000) + " μs";
        document.getElementById('finalResult').innerText = (2 * n * currentFreq * D).toLocaleString() + " km/s";
        modal.style.display = 'block'; resetPhoton();
    }

    function resetPhoton() { photon = null; fireBtn.disabled = false; fireBtn.classList.remove('armed'); isFrozen = false; resumeBtn.style.display = 'none'; }
    function closeModal() { modal.style.display = 'none'; flightTime = 0; }
    
    function loop() {
        if (!isFrozen) {
            const target = C / (2 * n * D);
            const alpha = (2 * Math.PI) / n;
            const lastMod = (angle % alpha);
            angle += (currentFreq / target) * (alpha / 60); 
            const currentMod = (angle % alpha);
            if (fireQueued && !photon && lastMod > currentMod) {
                const posA = { x: centerX + octRadius * Math.cos(-alpha/2), y: centerY + octRadius * Math.sin(-alpha/2) };
                photon = { x: posA.x, y: posA.y - 60, stage: 'launch' };
                fireQueued = false; fireBtn.classList.remove('armed');
            }
        }
        draw(); requestAnimationFrame(loop);
    }

    sideSelector.onchange = (e) => {
        n = parseInt(e.target.value);
        const target = C / (2 * n * D);
        freqSlider.min = Math.floor(target * 0.3); freqSlider.max = Math.ceil(target * 1.7);
        freqSlider.value = Math.round(target * 0.85); currentFreq = parseInt(freqSlider.value);
        freqVal.innerText = currentFreq;
    };
    freqSlider.oninput = (e) => { currentFreq = parseInt(e.target.value); freqVal.innerText = currentFreq; };
    fireBtn.onclick = () => { initAudio(); if (!photon) { fireQueued = true; fireBtn.classList.add('armed'); fireBtn.disabled = true; statusMsg.innerText = "Syncing..."; } };
    
    freezeToggle.onclick = () => {
        freezeEnabled = !freezeEnabled;
        freezeToggle.innerText = `Freeze at Impact: ${freezeEnabled ? 'ON' : 'OFF'}`;
        freezeToggle.classList.toggle('active');
    };
    resumeBtn.onclick = () => { isFrozen = false; resumeBtn.style.display = 'none'; finishTrip(); };

    loop();
</script>
</body>
</html>
